<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard - Secure & Share Docs</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="brand">
          <div class="brand-badge">SS</div>
          Secure & Share Docs
        </div>
        <nav class="nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="upload.html">Upload</a>
          <a href="share.html">Share</a>
          <a href="profile.html">My Profile</a>
          <a href="#" id="logout-link">Logout</a>
        </nav>
      </header>

      <section class="section">
        <div class="card">
          <h1>Dashboard</h1>
          <p id="welcome-text" class="status">Loading your profile...</p>
          <div class="actions">
            <a class="hero-cta" href="upload.html">Upload Document</a>
            <a class="hero-cta secondary" href="share.html">Share Document</a>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>My Documents</h2>
        <div id="my-docs" class="grid"></div>
      </section>

      <section class="section">
        <h2>Shared With Me</h2>
        <div id="shared-docs" class="grid"></div>
      </section>

      <footer class="footer">
        Your documents are protected and logged with every action.
      </footer>
    </div>
    <script type="module" src="js/documents.js"></script>
  </body>
</html>

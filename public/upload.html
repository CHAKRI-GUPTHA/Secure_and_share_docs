<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload - Secure & Share Docs</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="brand">
          <div class="brand-badge">SS</div>
          Secure & Share Docs
        </div>
        <nav class="nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="share.html">Share</a>
          <a href="profile.html">My Profile</a>
          <a href="#" id="logout-link">Logout</a>
        </nav>
      </header>

      <section class="section">
        <div class="card">
          <h1>Upload Document</h1>
          <p>Accepted formats: PDF, JPG, PNG.</p>
          <form class="form" id="upload-form">
            <div>
              <label for="doc-name">Document Name</label>
              <input id="doc-name" type="text" required />
            </div>
            <div>
              <label for="doc-type">Document Type</label>
              <select id="doc-type" required>
                <option value="Aadhaar">Aadhaar</option>
                <option value="PAN">PAN</option>
                <option value="Passport">Passport</option>
                <option value="Marksheet">Marksheet</option>
                <option value="Certificate">Certificate</option>
                <option value="Health">Health Record</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div>
              <label for="doc-file">Select File</label>
              <input id="doc-file" type="file" accept=".pdf,image/*" required />
            </div>
            <button type="submit">Upload</button>
            <div class="status" id="upload-status"></div>
          </form>
        </div>
      </section>
    </div>
    <script type="module" src="js/documents.js"></script>
  </body>
</html>
